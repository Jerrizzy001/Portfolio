<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 220 56" width="220" height="56">
  <defs>
    <linearGradient id="textGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1"/>
      <stop offset="55%" style="stop-color:#a855f7"/>
      <stop offset="100%" style="stop-color:#ec4899"/>
    </linearGradient>
    <linearGradient id="dotGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#a855f7"/>
      <stop offset="100%" style="stop-color:#ec4899"/>
    </linearGradient>
  </defs>

  <!-- Accent dot -->
  <circle cx="10" cy="10" r="5" fill="url(#dotGrad)" opacity="0.9"/>

  <!-- Jerrizzy text -->
  <text
    x="24"
    y="40"
    font-family="Inter, system-ui, -apple-system, sans-serif"
    font-size="34"
    font-weight="800"
    letter-spacing="-1"
    fill="url(#textGrad)"
  >Jerrizzy</text>

  <!-- Underline accent -->
  <rect x="24" y="46" width="192" height="3" rx="2" fill="url(#textGrad)" opacity="0.35"/>
</svg>
